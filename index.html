<!DOCTYPE html>
<html>
<head>
    <title>Neon Rush Multiplayer | @rp_gupta_07</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; pointer-events: none; }
        #score { font-size: 50px; font-weight: 900; text-shadow: 0 0 20px #0ff; }
        #lobby { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        input { padding: 12px; border-radius: 8px; border: 2px solid #0ff; background: #111; color: #fff; margin: 10px; text-align: center; }
        button { padding: 12px 40px; border-radius: 8px; border: none; background: #0ff; color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="color:#0ff; letter-spacing: 5px;">NEON RUSH</h1>
    <input type="text" id="room" placeholder="Enter Room Name">
    <button onclick="join()">START RACE</button>
</div>

<div id="ui">
    <div id="score">0</div>
    <div id="players" style="font-size: 12px; opacity: 0.6;">Waiting for rivals...</div>
</div>

<canvas id="game"></canvas>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyARuO_pN2vdYrVKYkKHHaNys7WI8HqM6I4",
    databaseURL: "https://friendchat-43941-default-rtdb.firebaseio.com",
    projectId: "friendchat-43941",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let bird = { y: 300, v: 0, g: 0.6, jump: -8, x: 100 };
let pipes = [];
let score = 0;
let roomID, myID, players = {}, active = false;

function join() {
    roomID = document.getElementById('room').value || "Global";
    myID = Math.random().toString(36).substr(2, 5);
    document.getElementById('lobby').style.display = 'none';
    active = true;
    
    // Firebase Sync
    const pRef = db.ref(`neon/${roomID}/players/${myID}`);
    pRef.onDisconnect().remove();
    db.ref(`neon/${roomID}/players`).on('value', s => players = s.val() || {});
    
    // Pipe Sync (Host creates pipes)
    if(Object.keys(players).length === 0) {
        setInterval(spawnPipe, 2000);
    }
    db.ref(`neon/${roomID}/pipes`).on('value', s => pipes = s.val() || []);

    requestAnimationFrame(loop);
}

function spawnPipe() {
    if(!active) return;
    const gap = 150;
    const pos = Math.random() * (canvas.height - 300) + 100;
    pipes.push({ x: canvas.width, pos, gap });
    if(pipes.length > 5) pipes.shift();
    db.ref(`neon/${roomID}/pipes`).set(pipes);
}

window.addEventListener('mousedown', () => bird.v = bird.jump);
window.addEventListener('keydown', (e) => { if(e.code === 'Space') bird.v = bird.jump; });

function loop() {
    if(!active) return;
    
    // Physics
    bird.v += bird.g;
    bird.y += bird.v;
    
    // Update Firebase
    db.ref(`neon/${roomID}/players/${myID}`).set({ y: bird.y, score: score });

    // Canvas Logic
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.fillStyle = '#050505';
    ctx.fillRect(0,0,canvas.width, canvas.height);

    // Draw Pipes
    pipes.forEach(p => {
        p.x -= 3;
        ctx.fillStyle = '#0ff';
        ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
        ctx.fillRect(p.x, 0, 50, p.pos); // Top
        ctx.fillRect(p.x, p.pos + p.gap, 50, canvas.height); // Bottom
        
        // Score & Collision (Simple)
        if(p.x === 100) score++;
    });

    // Draw Rival Ghosts
    Object.keys(players).forEach(id => {
        if(id === myID) return;
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = '#f0f';
        ctx.beginPath(); ctx.arc(100, players[id].y, 20, 0, 7); ctx.fill();
    });

    // Draw Me
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#0ff';
    ctx.beginPath(); ctx.arc(100, bird.y, 20, 0, 7); ctx.fill();
    
    document.getElementById('score').innerText = score;
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
