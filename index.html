<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>

<style>
/* नए एनीमेशन और ग्लो इफेक्ट्स */
.active-turn {
    box-shadow: 0 0 20px var(--primary);
    border: 2px solid var(--primary) !important;
    transform: scale(1.05);
    transition: 0.3s;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}

.shake { animation: shake 0.2s ease-in-out 0s 2; border: 1px solid var(--accent) !important; }

.stats-bar {
    font-size: 10px; color: #888; margin-top: 5px;
    display: flex; gap: 10px; justify-content: center;
}
</style>

<script>
// --- SOUND EFFECTS ---
const sfx = {
    click: new Howl({ src: ['https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'], volume: 0.5 }),
    win: new Howl({ src: ['https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'], volume: 0.7 }),
    error: new Howl({ src: ['https://assets.mixkit.co/active_storage/sfx/2573/2573-preview.mp3'], volume: 0.4 })
};

// --- WIN STREAK SYSTEM ---
let winStreak = localStorage.getItem('ticTacToeStreak') || 0;

function updateStreak(won) {
    if(won) {
        winStreak++;
        localStorage.setItem('ticTacToeStreak', winStreak);
    } else {
        winStreak = 0;
        localStorage.setItem('ticTacToeStreak', 0);
    }
}

// --- MODIFIED MOVE FUNCTION ---
function move(i) {
    gameRef.once("value", snap => {
        const g = snap.val();
        const cellElement = document.getElementById("board").children[i];

        if(!g || g.turn !== mySymbol || g.board[i] !== "" || checkWinner(g.board, g.size)) {
            // Error Feedback
            sfx.error.play();
            cellElement.classList.add('shake');
            setTimeout(() => cellElement.classList.remove('shake'), 400);
            return;
        }

        // Logic for Haptic Feedback (Mobile)
        if (navigator.vibrate) navigator.vibrate(50);
        
        sfx.click.play();
        g.board[i] = mySymbol;
        
        let updateData = { board: g.board, turn: mySymbol === "X" ? "O" : "X" };
        
        const winCheck = checkWinner(g.board, g.size);
        if(winCheck && winCheck !== "draw") {
            if(winCheck.w === mySymbol) {
                sfx.win.play();
                updateStreak(true);
            }
            g.scores[winCheck.w]++;
            updateData.scores = g.scores;
        }
        gameRef.update(updateData);
    });
}

// --- MODIFIED LISTEN GAME (Turn Glow) ---
function listenGame() {
    gameRef.on("value", snap => {
        const g = snap.val(); if(!g) return;
        
        // Update Turn Glow
        const p1Box = document.querySelectorAll('.score-box')[0];
        const p2Box = document.querySelectorAll('.score-box')[1];
        
        if(g.turn === "X") {
            p1Box.classList.add('active-turn');
            p2Box.classList.remove('active-turn');
        } else {
            p2Box.classList.add('active-turn');
            p1Box.classList.remove('active-turn');
        }

        // ... बाकी पुराना बोर्ड अपडेट कोड यहाँ रहेगा ...
        g.board.forEach((v, i) => { 
            const c = document.getElementById("board").children[i];
            if(c && c.innerText !== v) { // Only update if changed
                c.innerText = v; 
                c.style.color = v === 'X' ? 'var(--primary)' : 'var(--accent)'; 
            }
        });

        const winData = checkWinner(g.board, g.size);
        if(winData) {
            if(winData !== "draw") {
                winData.line.forEach(idx => document.getElementById("board").children[idx].classList.add("winner-cell"));
                let winName = (winData.w === "X" ? g.players.X : g.players.O).toUpperCase();
                setTimeout(() => {
                    document.getElementById("winnerName").innerText = winName;
                    document.getElementById("winnerOverlay").style.display = "flex";
                    if(winData.w === mySymbol) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }, 800);
            }
        }
    });
}
</script>
