<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Neon Z-Strike | @rp_gupta_07</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #ui { position: fixed; inset: 0; pointer-events: none; padding: 20px; z-index: 10; }
        .stat { color: #0f0; font-size: 20px; text-shadow: 0 0 10px #0f0; margin-bottom: 10px; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #0f0; border-radius: 50%; transform: translate(-50%, -50%); }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #0f0; }
        .btn { padding: 15px 40px; background: #0f0; color: #000; border: none; font-weight: 900; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="font-size: 50px;">NEON Z-STRIKE</h1>
    <p>SURVIVE THE NIGHT • BY @RP_GUPTA_07</p>
    <button class="btn" onclick="start()">ENTER ARENA</button>
</div>

<div id="ui">
    <div class="stat" id="hp">INTEGRITY: 100%</div>
    <div class="stat" id="score">KILLS: 0</div>
    <div style="position: absolute; bottom: 20px; right: 20px; color: #555; font-size: 10px;">WASD - MOVE | CLICK - FIRE</div>
</div>

<canvas id="arena"></canvas>

<script>
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
let w, h, player, enemies = [], bullets = [], score = 0, active = false;
let keys = {};

function start() {
    document.getElementById('overlay').style.display = 'none';
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    player = { x: w/2, y: h/2, hp: 100, angle: 0 };
    active = true;
    requestAnimationFrame(loop);
    setInterval(spawnEnemy, 2000); // हर 2 सेकंड में नया ज़ोंबी
}

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousemove', e => {
    if(!active) return;
    player.angle = Math.atan2(e.clientY - h/2, e.clientX - w/2);
});
window.addEventListener('mousedown', fire);

function spawnEnemy() {
    if(!active) return;
    let dist = 600;
    let ang = Math.random() * Math.PI * 2;
    enemies.push({
        x: player.x + Math.cos(ang) * dist,
        y: player.y + Math.sin(ang) * dist,
        hp: 30
    });
}

function fire() {
    if(!active) return;
    bullets.push({
        x: player.x, y: player.y,
        vx: Math.cos(player.angle) * 12,
        vy: Math.sin(player.angle) * 12,
        life: 60
    });
}

function update() {
    if(player.hp <= 0) {
        alert("GAME OVER! KILLS: " + score);
        location.reload();
    }

    if(keys['KeyW']) { player.x += Math.cos(player.angle) * 4; player.y += Math.sin(player.angle) * 4; }
    if(keys['KeyS']) { player.x -= Math.cos(player.angle) * 2; player.y -= Math.sin(player.angle) * 2; }

    // Bullet Logic
    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy; b.life--;
        if(b.life <= 0) bullets.splice(i, 1);
        
        enemies.forEach((e, ei) => {
            if(Math.hypot(b.x - e.x, b.y - e.y) < 20) {
                e.hp -= 10;
                bullets.splice(i, 1);
                if(e.hp <= 0) { enemies.splice(ei, 1); score++; }
            }
        });
    });

    // Enemy AI
    enemies.forEach(e => {
        let ang = Math.atan2(player.y - e.y, player.x - e.x);
        e.x += Math.cos(ang) * 2;
        e.y += Math.sin(ang) * 2;
        if(Math.hypot(e.x - player.x, e.y - player.y) < 25) player.hp -= 0.5;
    });

    document.getElementById('hp').innerText = `INTEGRITY: ${Math.ceil(player.hp)}%`;
    document.getElementById('score').innerText = `KILLS: ${score}`;
}

function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,w,h);
    
    const cx = w/2 - player.x;
    const cy = h/2 - player.y;

    // Grid Effect
    ctx.strokeStyle = '#020';
    for(let i=-2000; i<2000; i+=100) {
        ctx.beginPath(); ctx.moveTo(i + cx, -2000 + cy); ctx.lineTo(i + cx, 2000 + cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-2000 + cx, i + cy); ctx.lineTo(2000 + cx, i + cy); ctx.stroke();
    }

    // Draw Zombies
    enemies.forEach(e => {
        ctx.fillStyle = '#f00';
        ctx.shadowBlur = 10; ctx.shadowColor = 'red';
        ctx.beginPath(); ctx.arc(e.x + cx, e.y + cy, 15, 0, 7); ctx.fill();
    });

    // Draw Bullets
    bullets.forEach(b => {
        ctx.fillStyle = '#0f0';
        ctx.beginPath(); ctx.arc(b.x + cx, b.y + cy, 3, 0, 7); ctx.fill();
    });

    // Draw Me
    ctx.save();
    ctx.translate(w/2, h/2);
    ctx.rotate(player.angle);
    ctx.shadowBlur = 20; ctx.shadowColor = '#0f0';
    ctx.fillStyle = '#0f0';
    ctx.fillRect(-15, -15, 30, 30);
    ctx.fillStyle = '#fff'; ctx.fillRect(10, -2, 15, 4); // Gun
    ctx.restore();
}

function loop() {
    update();
    draw();
    if(active) requestAnimationFrame(loop);
}
</script>
</body>
</html>
